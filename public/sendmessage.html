<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Notification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 50%;
            margin: 100px auto;
            padding: 20px;
            background-color: #ffffff;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        h2 {
            text-align: center;
            color: #333;
            font-size: 28px;
        }
        .input-group {
            margin: 20px 0;
            padding: 10px;
        }
        label {
            font-size: 18px;
            color: #555;
            display: block;
            margin-bottom: 8px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #45a049;
        }
        .message {
            text-align: center;
            font-size: 18px;
            color: #28a745;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Send Message</h2>
    <form id="notificationForm">
        <div class="input-group">
            <label for="sentTo">Sent To </label>
            <input type="number" id="sentTo" name="sentTo" required>
        </div>
        <div class="input-group">
            <label for="sentBy">Sent By </label>
            <input type="number" id="sentBy" name="sentBy" required>
        </div>
        <div class="input-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="4" required></textarea>
        </div>
        <div class="input-group">
            <label for="deadline">Deadline</label>
            <input type="date" id="deadline" name="deadline" required>
        </div>
        <button type="submit">Send Message</button>
    </form>
    <div id="successMessage" class="message" style="display:none;">
        Message sent successfully!
    </div>
</div>

<script>
    const form = document.getElementById('notificationForm');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', function(event) {
        event.preventDefault();

        const formData = new FormData(form);
        const data = {
            sentTo: formData.get('sentTo'),
            sentBy: formData.get('sentBy'),
            message: formData.get('message'),
            deadline: formData.get('deadline')
        };

        fetch('/send-notification', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                successMessage.style.display = 'block';
                form.reset();
            } else {
                alert('Error: ' + data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('There was an error sending the notification.');
        });
    });
</script>

</body>
</html>
