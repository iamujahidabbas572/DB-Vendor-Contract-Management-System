<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: #ffffff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333333;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            padding: 15px;
            border: 1px solid #cccccc;
            border-radius: 5px;
            margin-bottom: 10px;
            background-color: #f5f5f5;
            cursor: pointer;
        }
        li:hover {
            background-color: #e0e0e0;
        }
        .details {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #e7f3fe;
            border: 1px solid #b3d4fc;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vendor List</h1>
        <ul id="vendorList"></ul>
        <div class="details" id="vendorDetails"></div>
    </div>

    <script>
        
        async function fetchVendors() {
            try {
                const response = await fetch('http://localhost:3000/vendors');
                const vendors = await response.json();

                const vendorList = document.getElementById('vendorList');
                vendors.forEach(vendor => {
                    const listItem = document.createElement('li');
                    listItem.textContent = `Vendor ${vendor.VendorID}: ${vendor.ServiceCategory}`;
                    listItem.addEventListener('click', () => showVendorDetails(vendor));
                    vendorList.appendChild(listItem);
                });
            } catch (error) {
                console.error('Error fetching vendors:', error);
            }
        }

        
        function showVendorDetails(vendor) {
            const vendorDetails = document.getElementById('vendorDetails');
            vendorDetails.innerHTML = `
                <h2>Vendor ${vendor.VendorID}</h2>
                <p><strong>User ID:</strong> ${vendor.UserID}</p>
                <p><strong>Service Category:</strong> ${vendor.ServiceCategory}</p>
                <p><strong>Compliance Certifications:</strong> ${vendor.ComplianceCertifications || 'N/A'}</p>
                <p><strong>Performance Rating:</strong> ${vendor.PerformanceRating || 'N/A'}</p>
            `;
            vendorDetails.style.display = 'block';
        }

        
        fetchVendors();
    </script>
</body>
</html>
