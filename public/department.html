<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('images/ok.gif');
            background-size: 80%;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #fff;
        }

        h1 {
            text-align: center;
            margin-top: 0px;
            font-size: 50px;
            color: #fff;
            text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.7);
            background: linear-gradient(90deg, #ff69b4, #4682b4);
            padding: 8px;
            border-radius: 15px;
            box-shadow: 0px 10px 15px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            font-weight: bold;
            max-width: 100%;
        }

        .greeting {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 6px 14px;
            background-color: rgba(255, 105, 180, 0.8);
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #ff69b4;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s, transform 0.3s;
        }

        .greeting:hover {
            background-color: rgba(255, 105, 180, 1);
            transform: scale(1.05);
        }

        .hamburger {
            position: fixed;
            top: 9px;
            left: 20px;
            cursor: pointer;
            z-index: 20;
        }

        .hamburger div {
            width: 35px;
            height: 5px;
            margin: 6px 0;
            background-color: #090101;
            transition: 0.4s;
        }

        .menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 10;
            padding-top: 60px;
            color: #fff;
        }

        .menu a {
            display: block;
            padding: 15px 25px;
            text-decoration: none;
            color: #fff;
            font-size: 18px;
            border-bottom: 1px solid #fff;
            transition: background-color 0.3s;
        }

        .menu a:hover {
            background-color: #4682b4;
        }

        .menu.active {
            transform: translateX(0);
        }

        .hamburger.active div:nth-child(1) {
            transform: rotate(-45deg) translate(-5px, 6px);
        }

        .hamburger.active div:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active div:nth-child(3) {
            transform: rotate(45deg) translate(-5px, -6px);
        }

        p {
            text-align: center;
            font-size: 18px;
            color: #ddd;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="hamburger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>

    <div class="menu" id="menu">
        <a href="contract.html">Create Contract</a>
        <a href="/seecontracts.html">See Contracts</a>
        <a href="/expiringcontracts.html">See Expiring Contracts</a>
        <a href="/purchaseorder.html">Create Purchase Order</a>
        <a href="/trackpurchaseorder.html">Track Purchase Orders</a>
        <a href="/vendorperfomance.html">Rate Vendor</a>
        <a href="/seevendors.html">See Vendors</a>
        <a href="/seebudget.html">Track Budget</a>
        <a href="sendmessage.html">Send Message</a>
        <a href="receivemessage.html">View Messages</a>
    </div>

    <h1>Department Dashboard</h1>

    <div id="greeting" class="greeting"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');

        if (name) {
            localStorage.setItem('username', name);
        }

        const storedName = localStorage.getItem('username');

        if (storedName) {
            document.getElementById('greeting').textContent = `Hello, ${storedName}`;
        } else {
            document.getElementById('greeting').textContent = 'Hello, Guest';
        }

        function toggleMenu() {
            document.getElementById('menu').classList.toggle('active');
            document.querySelector('.hamburger').classList.toggle('active');
        }

        const success = params.get('success');
        if (success) {
            alert(" Added Successfully!");
        }

        const formSuccess = params.get('formSuccess');
        if (formSuccess) {
            alert("Form submitted successfully!");
        }
    </script>
</body>
</html>
