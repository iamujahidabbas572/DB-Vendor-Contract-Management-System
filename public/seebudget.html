<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Budget Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: #ffffff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333333;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #555555;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #cccccc;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #e7f3fe;
            border: 1px solid #b3d4fc;
            border-radius: 5px;
        }
        .result span {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Department Budget Details</h1>
        <form id="departmentForm">
            <label for="departmentId">Enter Department ID:</label>
            <input type="number" id="departmentId" name="departmentId" required>
            <button type="submit">Get Details</button>
        </form>
        <div class="result" id="result" style="display: none;"></div>
    </div>

    <script>
        document.getElementById('departmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const departmentId = document.getElementById('departmentId').value;

            try {
                const response = await fetch(`http://localhost:3000/department/${departmentId}`);
                if (!response.ok) {
                    throw new Error('Department not found!');
                }
                const data = await response.json();
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `
                    <p><span>Department ID:</span> ${data.DepartmentID}</p>
                    <p><span>Name:</span> ${data.Name}</p>
                    <p><span>Budget:</span> $${data.Budget}</p>
                    <p><span>Remaining Amount:</span> $${data.RemainingAmount}</p>
                    <p><span>Status:</span> ${data.BudgetStatus}</p>
                `;
                resultDiv.style.display = 'block';
            } catch (error) {
                alert(error.message);
            }
        });
    </script>
</body>
</html>
