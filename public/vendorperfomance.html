<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Performance Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        form {
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 300px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input, textarea, button {
            width: 100%;
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #00ff9d;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <form id="vendorForm" action="/submitVendorPerformance" method="POST">
        <label for="vendorID">Vendor ID:</label>
        <input type="number" id="vendorID" name="vendorID" required>

        <label for="rating">Rating:</label>
        <input type="number" step="0.1" id="rating" name="rating" required>

        <label for="feedback">Feedback:</label>
        <textarea id="feedback" name="feedback" rows="4"></textarea>

        <label for="date">Date:</label>
        <input type="date" id="date" name="date" required>

        
        <input type="hidden" name="redirectTo" value="department.html">

        <button type="submit">Submit</button>
    </form>

    <script>
        const form = document.getElementById('vendorForm');

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); 

            
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            
            const response = await fetch(form.action, {
                method: form.method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
            });

            if (response.ok) {
                const result = await response.json();
                alert(result.message); 
                window.location.href = result.redirect; 
            } else {
                alert('Failed to add vendor performance. Please try again.');
            }
        });
    </script>
</body>
</html>
